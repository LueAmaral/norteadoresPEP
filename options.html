<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Configurações - Norteadores de Atendimento</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 700px;
            padding: 15px;
            margin: auto;
        }
    </style>
</head>

<body>
    <h1 class="options-main-title">Norteadores de Atendimento</h1>

    <div class="container-section options-columns-wrapper">
        <div class="options-column options-column-left">
            <label for="professionalCategorySelect">Minha Categoria Profissional:</label>
            <select id="professionalCategorySelect">
                <option value="">Carregando...</option>
            </select>
        </div>
        <div class="options-column options-column-right">
            <h4>Linhas de Cuidado Habilitadas:</h4>
            <div id="careLinesContainer">
                <p>Selecione uma categoria profissional para ver as linhas de cuidado.</p>
            </div>
        </div>
    </div>

    <div class="container-section options-columns-wrapper">
        <div class="options-column options-column-left">
            <button id="syncBtn">Sincronizar Snippets Agora</button>
            <div id="syncStatus"></div>
        </div>
        <div class="options-column options-column-right">
            <h4>Sincronização Automática</h4>
            <label style="font-weight: normal; display: flex; align-items: center;">
                <input type="checkbox" id="syncEnabledCheckbox" style="margin-right: 8px;"> Habilitar sincronização
                automática com o GitHub (diariamente)
            </label>
            <div id="syncEnabledStatus" style="font-size: 0.9em; margin-top: 5px; color: green;"></div>
        </div>
    </div>


    <div class="container-section options-columns-wrapper">
        <div class="options-column options-column-left">

            <h4>Modo de Inserção de Snippets</h4>
            <label>
                <input type="radio" name="insertionMode" value="button"> Inserir com Botão (📌 ao lado do campo de
                texto)
            </label>
            <label>
                <input type="radio" name="insertionMode" value="command"> Inserir com Comando (ex: /meu_snippet)
            </label>
            <label>
                <input type="radio" name="insertionMode" value="both" checked> Ambos (Botão e Comando)
            </label>
            <div id="insertionModeStatus" style="font-size: 0.9em; margin-top: 5px; color: green;"></div>
        </div>
        <div class="options-column options-column-right">
            <h4>Editor de Snippets</h4>
            <button id="openEditorBtn">Abrir Editor de Snippets</button>
        </div>
    </div>



    <div class="container-section">
        <h4>Página de Teste</h4>
        <button id="openTestPageBtn">Abrir Página de Teste</button>
    </div>

    <div class="container-section">
        <h2>Site Allowlist</h2>
        <label for="allowlistTextarea">Enter allowed site URLs (one per line, e.g., <code>https://mail.google.com</code> or <code>example.com</code> for matching subdomains):</label>
        <textarea id="allowlistTextarea" rows="5" style="width: 98%;"></textarea>
        <button id="saveAllowlistBtn" style="margin-top: 10px;">Save Allowlist</button>
        <div id="allowlistStatus" style="font-size: 0.9em; margin-top: 5px; color: green;"></div>
    </div>

    <div class="container-section">
        <h2>Rich Text Snippets</h2>
        <label style="font-weight: normal; display: flex; align-items: center;">
            <input type="checkbox" id="enableRichTextCheckbox" style="margin-right: 8px;"> Enable Rich Text (HTML) for Snippets
        </label>
        <div id="richTextStatus" style="font-size: 0.9em; margin-top: 5px; color: green;"></div>
    </div>

    <script src="options.js"></script>
</body>

</html>
